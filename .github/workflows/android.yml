name: Release Build
run-name: Release Build - ${{ github.ref_name }}

on:
  push:
    tags:
      - "[0-9]*-*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Release tag (格式: VersionCode-VersionName，如 1-0.1.2)"
        required: true
        default: "1-0.1.2"

env:
  CI: "true"
  JAVA_DISTRIBUTION: "oracle"
  JAVA_VERSION: "17.0.1"
  ANDROID_API_LEVEL: "36"
  ANDROID_BUILD_TOOLS: "36.0.0"
  LOCAL_GRADLE_VERSION: "9.4.0-milestone-3"
  LOCAL_AGP_VERSION: "9.0.1"
  LOCAL_KOTLIN_VERSION: "2.2.10"
  RELEASE_DIR: app/build/outputs/apk/release
  STAGING_DIR: app/build/outputs/apk/all
  ASSET_DIR: app/build/outputs/apk/release-assets
  ARTIFACT_PASSWORD: Sesame-AG
  RELEASE_TAG_RAW: ${{ github.event.inputs.release_tag || github.ref_name }}

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  preflight:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      reason: ${{ steps.check.outputs.reason }}

    steps:
      - name: Set Timezone to Asia/Shanghai
        shell: bash
        run: |
          set -euo pipefail
          sudo timedatectl set-timezone Asia/Shanghai
          echo "Current time: $(date)"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Validate Project Toolchain Baseline
        shell: bash
        run: |
          set -euo pipefail

          grep -Eq '^distributionUrl=.*gradle-'"${LOCAL_GRADLE_VERSION//./\\.}"'-bin\.zip$' gradle/wrapper/gradle-wrapper.properties
          grep -Eq '^android-plugin = "'"${LOCAL_AGP_VERSION//./\\.}"'"$' gradle/libs.versions.toml
          grep -Eq '^kotlin = "'"${LOCAL_KOTLIN_VERSION//./\\.}"'"$' gradle/libs.versions.toml
          grep -Eq '^appVersion=.+' gradle.properties
          grep -Eq 'compileSdk = '"${ANDROID_API_LEVEL}"'$' app/build.gradle.kts
          grep -Eq 'sourceCompatibility = JavaVersion.VERSION_17' app/build.gradle.kts
          grep -Eq 'targetCompatibility = JavaVersion.VERSION_17' app/build.gradle.kts

      - name: Resolve Release Metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          release_tag_regex='^([0-9]+)-(.+)$'
          tag_valid="false"
          tag_version_code=""
          version_name=""

          if [[ "${RELEASE_TAG_RAW}" =~ ${release_tag_regex} ]]; then
            tag_valid="true"
            tag_version_code="${BASH_REMATCH[1]}"
            version_name="${BASH_REMATCH[2]}"
          fi

          configured_version_name="$(sed -n 's/^appVersion=//p' gradle.properties | head -n1 | tr -d '\r')"
          if [[ -z "${configured_version_name}" ]]; then
            echo "Failed to resolve appVersion from gradle.properties" >&2
            exit 1
          fi

          version_code="$(git rev-list --count HEAD | tr -d '\n')"
          if [[ -z "${version_code}" ]]; then
            echo "Failed to resolve versionCode from git history" >&2
            exit 1
          fi

          echo "tag_valid=${tag_valid}" >> "$GITHUB_OUTPUT"
          echo "tag_version_code=${tag_version_code}" >> "$GITHUB_OUTPUT"
          echo "configured_version_name=${configured_version_name}" >> "$GITHUB_OUTPUT"
          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "version_code=${version_code}" >> "$GITHUB_OUTPUT"

      - name: Check Signing
        id: check
        shell: bash
        env:
          TAG_VALID: ${{ steps.meta.outputs.tag_valid }}
          TAG_VERSION_CODE: ${{ steps.meta.outputs.tag_version_code }}
          CONFIGURED_VERSION_NAME: ${{ steps.meta.outputs.configured_version_name }}
          VERSION_NAME: ${{ steps.meta.outputs.version_name }}
          VERSION_CODE: ${{ steps.meta.outputs.version_code }}
          ANDROID_SIGNING_KEY: ${{ secrets.ANDROID_SIGNING_KEY }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing=()
          [[ -n "${ANDROID_SIGNING_KEY}" ]] || missing+=("ANDROID_SIGNING_KEY")
          [[ -n "${ANDROID_KEY_ALIAS}" ]] || missing+=("ANDROID_KEY_ALIAS")
          [[ -n "${ANDROID_KEYSTORE_PASSWORD}" ]] || missing+=("ANDROID_KEYSTORE_PASSWORD")
          [[ -n "${ANDROID_KEY_PASSWORD}" ]] || missing+=("ANDROID_KEY_PASSWORD")

          ready="false"
          reason=""

          if [[ ${#missing[@]} -gt 0 ]]; then
            reason="缺少必要 Secrets: ${missing[*]}"
          elif [[ "${TAG_VALID}" != "true" ]]; then
            reason="标签 ${RELEASE_TAG_RAW} 不符合 VersionCode-VersionName 格式"
          elif [[ "${VERSION_NAME}" != "${CONFIGURED_VERSION_NAME}" ]]; then
            reason="标签中的 versionName (${VERSION_NAME}) 与 gradle.properties 中的 appVersion (${CONFIGURED_VERSION_NAME}) 不一致"
          elif [[ "${TAG_VERSION_CODE}" != "${VERSION_CODE}" ]]; then
            reason="标签中的 versionCode (${TAG_VERSION_CODE}) 与当前提交计算得到的 versionCode (${VERSION_CODE}) 不一致"
          else
            ready="true"
            reason="预检通过"
          fi

          echo "ready=${ready}" >> "$GITHUB_OUTPUT"
          {
            echo "reason<<EOF"
            printf '%s\n' "${reason}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          {
            echo "## Release Preflight"
            echo
            echo "- 源仓库标签: \`${RELEASE_TAG_RAW}\`"
            echo "- 标签格式有效: \`${TAG_VALID}\`"
            echo "- 标签中的版本号: \`${TAG_VERSION_CODE}\`"
            echo "- 配置中的版本名: \`${CONFIGURED_VERSION_NAME}\`"
            echo "- 版本名称: \`${VERSION_NAME}\`"
            echo "- 版本号: \`${VERSION_CODE}\`"
            echo "- 检查结果: ${reason}"
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    needs: preflight
    if: needs.preflight.outputs.ready == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Set Timezone to Asia/Shanghai
        shell: bash
        run: |
          set -euo pipefail
          sudo timedatectl set-timezone Asia/Shanghai
          echo "Current time: $(date)"

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          architecture: x64
          check-latest: false
          cache: gradle

      - name: Pin Gradle Java Home
        shell: bash
        run: |
          set -euo pipefail
          echo "ORG_GRADLE_JAVA_HOME=${JAVA_HOME}" >> "$GITHUB_ENV"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: ""

      - name: Install Required Android SDK Packages
        shell: bash
        run: |
          set -euo pipefail
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-${ANDROID_API_LEVEL}" \
            "build-tools;${ANDROID_BUILD_TOOLS}"
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-read-only: false
          gradle-version: wrapper

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Print Toolchain Versions
        shell: bash
        run: |
          set -euo pipefail
          echo "JAVA_HOME=${JAVA_HOME}"
          echo "ORG_GRADLE_JAVA_HOME=${ORG_GRADLE_JAVA_HOME}"
          echo "ANDROID_HOME=${ANDROID_HOME:-}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-}"
          java -version
          sdkmanager --version
          ./gradlew --version

      - name: Build Release APKs
        shell: bash
        run: |
          set -euo pipefail
          ./gradlew --no-daemon --stacktrace assembleRelease

      - name: Stage Unsigned APKs
        shell: bash
        run: |
          set -euo pipefail
          rm -rf "${STAGING_DIR}" "${ASSET_DIR}"
          mkdir -p "${STAGING_DIR}"
          mapfile -t apks < <(find "${RELEASE_DIR}" -maxdepth 1 -type f -name "*.apk" | sort)
          if [[ ${#apks[@]} -eq 0 ]]; then
            echo "No release APKs found in ${RELEASE_DIR}" >&2
            exit 1
          fi
          for apk in "${apks[@]}"; do
            cp "${apk}" "${STAGING_DIR}/"
          done

      - name: Sign APKs
        id: sign_apks
        uses: ilharp/sign-android-release@v2
        with:
          releaseDir: ${{ env.STAGING_DIR }}
          signingKey: ${{ secrets.ANDROID_SIGNING_KEY }}
          keyAlias: ${{ secrets.ANDROID_KEY_ALIAS }}
          keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword: ${{ secrets.ANDROID_KEY_PASSWORD }}
          buildToolsVersion: ${{ env.ANDROID_BUILD_TOOLS }}

      - name: Prepare Release Assets
        id: prepare_assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${ASSET_DIR}"
          IFS=':' read -r -a files <<< "${{ steps.sign_apks.outputs.signedFiles }}"
          copied=0
          for file in "${files[@]}"; do
            [[ -n "${file}" ]] || continue
            cp "${file}" "${ASSET_DIR}/"
            (
              cd "${ASSET_DIR}"
              sha256sum "$(basename "${file}")" > "CHECKSUMS-$(basename "${file}").sha256"
            )
            copied=$((copied + 1))
          done
          if [[ ${copied} -eq 0 ]]; then
            echo "No signed APKs were produced" >&2
            exit 1
          fi
          echo "asset_dir=${ASSET_DIR}" >> "$GITHUB_OUTPUT"

      - name: Package APK Artifact
        id: package_artifact
        shell: bash
        run: |
          set -euo pipefail
          artifact_path="${RUNNER_TEMP}/Sesame-AG-${RELEASE_TAG_RAW}.zip"
          (
            cd "${ASSET_DIR}"
            zip -r -P "${ARTIFACT_PASSWORD}" "${artifact_path}" .
          )
          echo "artifact_path=${artifact_path}" >> "$GITHUB_OUTPUT"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Sesame-AG-${{ github.ref_name }}
          archive: false
          path: ${{ steps.package_artifact.outputs.artifact_path }}
          if-no-files-found: error

  skip:
    needs: preflight
    if: needs.preflight.outputs.ready != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Report Skip Reason
        shell: bash
        run: |
          set -euo pipefail
          echo "Release workflow skipped: ${{ needs.preflight.outputs.reason }}"
          {
            echo "## Release Skipped"
            echo
            echo "- 原因: ${{ needs.preflight.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"
